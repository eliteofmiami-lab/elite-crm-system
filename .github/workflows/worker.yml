# Cérebro Elite CRM — roda a cada 5 min, seg–sáb, 8am–7pm ET.
# ET (EDT, UTC-4): 8h–19h ET = 12h–23h UTC. Fim de dia 6:30pm ET = 22:30 UTC.
# NOTA: no inverno (EST, UTC-5) o horário desloca 1h — ajustar em novembro ou tratar no código.
name: elite-brain

on:
  schedule:
    - cron: "*/5 12-22 * * 1-6"   # ciclos de 5 min (8:00am–6:55pm EDT, seg–sáb)
    - cron: "0 23 * * 1-6"        # MVP item 7: BETA_FEEDBACK.md diário (19:00 EDT)
    # CONGELADO (MVP 2026-07-08): relatório 18:30 fora do ar — reativar com ordem
    # - cron: "30 22 * * 1-6"
  workflow_dispatch: {}            # rodada manual p/ testes

concurrency:
  group: elite-brain
  cancel-in-progress: false        # nunca matar um ciclo no meio de escritas

permissions:
  contents: write   # commit dos relatórios diários em docs/reports/

jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      # memória entre ciclos (última varredura, calls já processadas) até o Supabase assumir
      - name: restaurar estado do ciclo anterior
        uses: actions/cache/restore@v4
        with:
          path: out/state.json
          key: worker-state-${{ github.run_id }}
          restore-keys: worker-state-
      - name: montar .env a partir dos secrets
        run: |
          {
            echo "GHL_API_TOKEN=${{ secrets.GHL_API_TOKEN }}"
            echo "GHL_LOCATION_ID=${{ secrets.GHL_LOCATION_ID }}"
            echo "URABLE_API_KEY=${{ secrets.URABLE_API_KEY }}"
            echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}"
            echo "DEEPGRAM_API_KEY=${{ secrets.DEEPGRAM_API_KEY }}"
            echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}"
            echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
            echo "EUGENE_PHONE=${{ secrets.EUGENE_PHONE }}"
            echo "RAFAEL_PHONE=${{ secrets.RAFAEL_PHONE }}"
            echo "META_PIXEL_ID=${{ secrets.META_PIXEL_ID }}"
            echo "META_CAPI_TOKEN=${{ secrets.META_CAPI_TOKEN }}"
          } > .env
      - name: ciclo do cérebro
        run: python worker/brain/run.py
      - name: salvar estado p/ o próximo ciclo
        if: always()
        uses: actions/cache/save@v4
        with:
          path: out/state.json
          key: worker-state-${{ github.run_id }}
      # CONGELADO (MVP 2026-07-08): relatório 18:30 fora do agendamento — reativar com ordem.
      - name: relatório de fim de dia (CONGELADO)
        if: ${{ false }}
        run: python worker/brain/eod_report.py
      # MVP item 7: consolidação diária do feedback do beta (só leitura + arquivo)
      - name: BETA_FEEDBACK.md diário (rodada 23:00 UTC)
        if: github.event.schedule == '0 23 * * 1-6'
        run: |
          python worker/beta_feedback_md.py
          git config user.name "elite-brain" && git config user.email "bot@elite"
          git add BETA_FEEDBACK.md && git diff --cached --quiet || \
            (git commit -m "beta feedback $(date +%F)" && git push)
